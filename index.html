<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FutureDeal 대본 자동화</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --surface3: #22222f;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --accent: #6C63FF;
    --accent2: #4ECDC4;
    --accent3: #FF6B6B;
    --amber: #F7B731;
    --text: #f0f0f5;
    --text2: #9090a8;
    --text3: #5a5a70;
    --radius: 12px;
    --radius-lg: 18px;
  }

  body {
    font-family: 'Pretendard', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }

  /* Header */
  .header {
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    background: rgba(10,10,15,0.92);
    backdrop-filter: blur(12px);
    z-index: 100;
  }
  .logo-mark {
    width: 32px; height: 32px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 700; color: #fff;
  }
  .header-title { font-size: 16px; font-weight: 600; }
  .header-sub { font-size: 13px; color: var(--text3); margin-left: auto; }

  /* Layout */
  .layout {
    display: grid;
    grid-template-columns: 380px 1fr;
    height: calc(100vh - 61px);
  }

  /* Left Panel */
  .left-panel {
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .section-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 10px;
  }

  .input-group { display: flex; flex-direction: column; gap: 8px; }
  .input-label { font-size: 13px; color: var(--text2); font-weight: 500; }

  input[type="text"], textarea, select {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 11px 14px;
    font-family: 'Pretendard', sans-serif;
    font-size: 14px;
    color: var(--text);
    width: 100%;
    transition: border-color 0.2s;
    outline: none;
  }
  input[type="text"]:focus, textarea:focus, select:focus {
    border-color: var(--accent);
  }
  textarea { resize: vertical; min-height: 80px; }

  /* Tag checkboxes */
  .tag-group { display: flex; flex-wrap: wrap; gap: 8px; }
  .tag-check {
    display: none;
  }
  .tag-label {
    padding: 6px 12px;
    border: 1px solid var(--border2);
    border-radius: 20px;
    font-size: 12px;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
  }
  .tag-check:checked + .tag-label {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  /* Divider */
  .divider { height: 1px; background: var(--border); }

  /* Buttons */
  .btn-generate {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    padding: 14px 20px;
    font-family: 'Pretendard', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-generate:hover { background: #5a52e8; transform: translateY(-1px); }
  .btn-generate:active { transform: translateY(0); }
  .btn-generate:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .btn-tool {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 11px 14px;
    font-family: 'Pretendard', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.2s;
    display: flex; align-items: center; gap: 8px;
  }
  .btn-tool:hover { border-color: var(--accent2); color: var(--accent2); }
  .btn-tool.verify:hover { border-color: var(--amber); color: var(--amber); }
  .btn-tool:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-icon { font-size: 16px; }

  /* Right Panel */
  .right-panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .output-toolbar {
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .status-badge {
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 20px;
    font-weight: 500;
  }
  .status-idle { background: var(--surface3); color: var(--text3); }
  .status-loading { background: rgba(108,99,255,0.15); color: var(--accent); }
  .status-done { background: rgba(78,205,196,0.15); color: var(--accent2); }
  .status-verify { background: rgba(247,183,49,0.15); color: var(--amber); }
  .status-error { background: rgba(255,107,107,0.15); color: var(--accent3); }

  .output-actions { margin-left: auto; display: flex; gap: 8px; }
  .btn-copy {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 8px;
    padding: 7px 14px;
    font-size: 12px;
    font-family: 'Pretendard', sans-serif;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-copy:hover { border-color: var(--accent2); color: var(--accent2); }

  /* Script Output */
  .output-area {
    flex: 1;
    overflow-y: auto;
    padding: 28px 32px;
  }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 16px;
    color: var(--text3);
  }
  .empty-icon { font-size: 48px; opacity: 0.3; }
  .empty-text { font-size: 15px; text-align: center; line-height: 1.7; }

  /* Script Sections */
  .script-wrapper { max-width: 760px; }

  .script-section {
    margin-bottom: 28px;
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }

  .script-section-header {
    padding: 12px 18px;
    background: var(--surface2);
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid var(--border);
  }

  .section-tag {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    padding: 3px 9px;
    border-radius: 12px;
  }
  .tag-hook { background: rgba(108,99,255,0.2); color: #a09aff; }
  .tag-open { background: rgba(78,205,196,0.2); color: #4ECDC4; }
  .tag-product { background: rgba(247,183,49,0.2); color: var(--amber); }
  .tag-detail { background: rgba(255,255,255,0.08); color: var(--text2); }
  .tag-deal { background: rgba(255,107,107,0.2); color: #ff9090; }
  .tag-cta { background: rgba(108,99,255,0.3); color: #c0bcff; }
  .tag-verify-ok { background: rgba(78,205,196,0.2); color: #4ECDC4; }
  .tag-verify-warn { background: rgba(255,107,107,0.2); color: #ff9090; }

  .section-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
  }
  .section-time {
    margin-left: auto;
    font-size: 11px;
    color: var(--text3);
  }

  .script-section-body {
    padding: 18px;
    font-size: 14px;
    line-height: 1.85;
    color: var(--text);
    white-space: pre-wrap;
    word-break: keep-all;
  }

  .highlight-must {
    background: rgba(108,99,255,0.12);
    border-left: 3px solid var(--accent);
    padding: 10px 14px;
    border-radius: 0 8px 8px 0;
    margin: 8px 0;
    font-size: 13px;
    color: #c0bcff;
  }

  /* Loading animation */
  .loading-dots {
    display: inline-flex;
    gap: 4px;
    align-items: center;
  }
  .loading-dots span {
    width: 5px; height: 5px;
    background: var(--accent);
    border-radius: 50%;
    animation: bounce 0.9s infinite ease-in-out;
  }
  .loading-dots span:nth-child(2) { animation-delay: 0.15s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  /* Stream text */
  .stream-text { white-space: pre-wrap; word-break: keep-all; }

  /* Verify results */
  .verify-item {
    display: flex;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .verify-item:last-child { border-bottom: none; }
  .verify-ok-icon { color: var(--accent2); flex-shrink: 0; margin-top: 2px; }
  .verify-warn-icon { color: var(--accent3); flex-shrink: 0; margin-top: 2px; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }

  /* Loading overlay */
  .loading-overlay {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(10,10,15,0.7);
    align-items: center;
    justify-content: center;
    z-index: 50;
    flex-direction: column;
    gap: 16px;
    backdrop-filter: blur(4px);
  }
  .loading-overlay.active { display: flex; }
  .loading-msg { font-size: 14px; color: var(--text2); }

  /* Notice */
  .notice {
    background: rgba(108,99,255,0.08);
    border: 1px solid rgba(108,99,255,0.2);
    border-radius: var(--radius);
    padding: 12px 14px;
    font-size: 12px;
    color: var(--text2);
    line-height: 1.6;
  }
</style>
</head>
<body>

<header class="header">
  <div class="logo-mark">F</div>
  <span class="header-title">FutureDeal 대본 자동화</span>
  <span class="header-sub">퓨처딜 스크립트 생성 시스템 v1.0</span>
</header>

<div class="layout">
  <!-- Left Panel -->
  <div class="left-panel">

    <div>
      <div class="section-label">제품 정보</div>
      <div class="input-group">
        <label class="input-label">제품명 *</label>
        <input type="text" id="productName" placeholder="예: Anker 충전기 A2038" />
      </div>
    </div>

    <div class="input-group">
      <label class="input-label">제품 링크 (퓨처테리어 or 스마트스토어)</label>
      <input type="text" id="productUrl" placeholder="https://futureterior.com/..." />
    </div>

    <div class="input-group">
      <label class="input-label">브랜드</label>
      <input type="text" id="brandName" placeholder="예: Anker, Corsair, WiZ" />
    </div>

    <div class="input-group">
      <label class="input-label">제품 카테고리</label>
      <select id="category">
        <option value="">선택...</option>
        <option value="충전기/케이블">충전기 / 케이블</option>
        <option value="스마트 조명">스마트 조명</option>
        <option value="데스크 세팅">데스크 세팅</option>
        <option value="키보드/마우스">키보드 / 마우스</option>
        <option value="모니터/스탠드">모니터 / 스탠드</option>
        <option value="스피커/오디오">스피커 / 오디오</option>
        <option value="청소가전">청소 가전</option>
        <option value="보조배터리">보조배터리</option>
        <option value="스트리밍장비">스트리밍 장비</option>
        <option value="기타">기타</option>
      </select>
    </div>

    <div class="input-group">
      <label class="input-label">핵심 스펙 / 특장점 (선택사항)</label>
      <textarea id="specs" placeholder="예: 140W GaN, 4포트, 접이식 플러그, 초소형 설계...&#10;입력할수록 대본 퀄리티 향상"></textarea>
    </div>

    <div class="input-group">
      <label class="input-label">공동구매 가격 / 할인율 (선택사항)</label>
      <input type="text" id="dealPrice" placeholder="예: 정가 49,900원 → 공구가 34,900원 (30% ↓)" />
    </div>

    <div class="divider"></div>

    <div>
      <div class="section-label">필수 구성요소</div>
      <div class="tag-group">
        <input type="checkbox" class="tag-check" id="t1" value="futuredeal_open" checked>
        <label class="tag-label" for="t1">퓨처딜 오프닝</label>

        <input type="checkbox" class="tag-check" id="t2" value="subscribe_cta" checked>
        <label class="tag-label" for="t2">채널 구독 유도</label>

        <input type="checkbox" class="tag-check" id="t3" value="link_cta" checked>
        <label class="tag-label" for="t3">설명란 링크 CTA</label>

        <input type="checkbox" class="tag-check" id="t4" value="deadline_pressure" checked>
        <label class="tag-label" for="t4">공동구매 마감 압박</label>

        <input type="checkbox" class="tag-check" id="t5" value="problem_empathy">
        <label class="tag-label" for="t5">문제 공감 오프닝</label>

        <input type="checkbox" class="tag-check" id="t6" value="unboxing">
        <label class="tag-label" for="t6">언박싱 구간</label>

        <input type="checkbox" class="tag-check" id="t7" value="comparison">
        <label class="tag-label" for="t7">타 제품 비교</label>
      </div>
    </div>

    <div class="input-group">
      <label class="input-label">추가 요청사항 (선택사항)</label>
      <textarea id="extra" placeholder="예: 이 제품은 여성 직장인 대상으로 강조해줘&#10;경쟁사 A와 비교 구간 넣어줘" style="min-height:60px;"></textarea>
    </div>

    <div class="notice">
      💡 제품 링크를 입력하면 AI가 페이지를 분석해 스펙을 자동으로 파악합니다. 링크 없이도 제품명만으로 대본 생성 가능합니다.
    </div>

    <button class="btn-generate" id="btnGenerate" onclick="generateScript()">
      <span id="generateBtnText">✦ 대본 자동 생성</span>
    </button>

    <div class="btn-row">
      <button class="btn-tool verify" id="btnVerify" onclick="verifyScript()" disabled>
        <span class="btn-icon">🔍</span> 정보 검증
      </button>
      <button class="btn-tool" id="btnResearch" onclick="researchMore()" disabled>
        <span class="btn-icon">📡</span> 추가 조사
      </button>
    </div>

  </div>

  <!-- Right Panel -->
  <div class="right-panel" style="position:relative;">

    <div class="output-toolbar">
      <span id="statusBadge" class="status-badge status-idle">대기 중</span>
      <span id="statusDetail" style="font-size:12px; color:var(--text3);"></span>
      <div class="output-actions">
        <button class="btn-copy" onclick="copyScript()" id="btnCopy" style="display:none;">📋 전체 복사</button>
        <button class="btn-copy" onclick="resetAll()" style="color:var(--accent3); border-color:rgba(255,107,107,0.3);">↺ 초기화</button>
      </div>
    </div>

    <div class="output-area" id="outputArea">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">✦</div>
        <div class="empty-text">
          제품명과 링크를 입력하고<br>대본 자동 생성을 눌러주세요.<br><br>
          <span style="font-size:12px; opacity:0.6;">롱폼 8~12분 분량 · 해용 톤 · 퓨처딜 구조</span>
        </div>
      </div>

      <div class="script-wrapper" id="scriptWrapper" style="display:none;"></div>
    </div>

    <div class="loading-overlay" id="loadingOverlay">
      <div class="loading-dots"><span></span><span></span><span></span></div>
      <div class="loading-msg" id="loadingMsg">대본을 생성하고 있어요...</div>
    </div>

  </div>
</div>

<script>
// ─── API 설정 ───────────────────────────────────────────
// Netlify 배포 시 netlify/functions/claude.js 경로 사용
// 로컬 테스트 시에는 직접 API 호출 (개발용)
const API_ENDPOINT = '/.netlify/functions/claude';

// 개발/테스트 모드: API 키를 직접 넣어 로컬에서 바로 테스트 가능
// 실제 배포 시에는 반드시 Netlify Functions 사용
const DEV_MODE = true; // Netlify 배포 후 false로 변경
const DEV_API_KEY = ''; // 로컬 테스트용 - 실제 키 입력 (배포 시 반드시 제거)

let currentScript = '';
let isGenerating = false;

// ─── 필수 멘트 템플릿 ───────────────────────────────────
const MUST_MENTS = {
  futuredeal_open: `[퓨처딜 오프닝 필수 멘트]
"여러분, 오늘 퓨처딜에서 또 터졌습니다."
"퓨처테리어가 직접 협상한 이번 공동구매, 절대 그냥 지나치시면 안 됩니다."`,

  subscribe_cta: `[채널 구독 유도 멘트]
"이런 딜 정보 놓치기 싫으시면 지금 구독 버튼 꾹 눌러주세요. 알림도 같이요."
"퓨처테리어 채널 구독하시면 이런 공동구매 소식 제일 먼저 받으실 수 있어요."`,

  link_cta: `[설명란 링크 CTA 멘트]
"구매 링크는 영상 아래 설명란에 있어요. 댓글 말고 설명란 확인해 주세요."
"지금 바로 내려가서 링크 클릭하시면 바로 구매 페이지로 이동합니다."`,

  deadline_pressure: `[공동구매 마감 압박 멘트]
"공동구매 특성상 수량이 정해져 있어요. 품절되면 저도 어떻게 못 합니다."
"이 가격, 마감 끝나면 다시 못 받습니다. 지금이 기회예요."`,

  problem_empathy: `[문제 공감 오프닝 멘트]
"혹시 이런 경험 있으세요? ..."
"저도 처음엔 그랬어요. 그런데 이 제품 쓰고 나서 완전히 바뀌었습니다."`,

  unboxing: `[언박싱 구간]
"자, 지금부터 언박싱 해볼게요. 박스 퀄리티부터 봐주세요."
"패키징 상태, 구성품 하나하나 같이 확인해봅시다."`,

  comparison: `[타 제품 비교 구간]
"시중에 비슷한 제품들이 많죠. 근데 이게 다릅니다. 비교해 드릴게요."
"같은 가격대 경쟁 제품들이랑 스펙 비교해보면 이 제품의 가성비가 보입니다."`
};

// ─── 시스템 프롬프트 ─────────────────────────────────────
function buildSystemPrompt(checkedMents) {
  const mustMentsList = checkedMents.map(k => MUST_MENTS[k] || '').filter(Boolean).join('\n\n');

  return `당신은 유튜브 채널 "해용"(퓨처테리어)의 전속 대본 작가입니다.

## 해용 채널 정보
- 채널명: 해용 (구독자 27만)
- 채널 성격: 데스크 셋업, 홈오피스 버티컬 커머스 + 유튜브 쇼핑
- 주요 콘텐츠: 퓨처딜 (공동구매 특가 영상)
- 운영사: 퓨처테리어 (없던컴퍼니)
- 오프라인 쇼룸: 판교 아이스퀘어

## 해용 나레이션 스타일
- 짧고 리드미컬한 문장 ("이거 진짜예요." "봐봐요, 이게 핵심입니다." "여러분, 잠깐요.")
- 질문-공감-해설 리듬 반복
- 감탄과 리듬감 ("와, 이게 돼요?" "진짜로요?" "믿기지 않죠?")
- 제품명을 반복 강조
- "여러분" 호칭 사용
- 핵심 메시지 반복 강조
- 판매/전환 중심의 어투
- Claim → Reason → Example → Reinforced Claim 구조

## 대본 구조 (롱폼 8~12분 / 약 2,400~3,600자)
1. 🎣 훅 (Hook) - 0:00~0:30 | 시선을 확 잡는 첫 문장
2. 📢 퓨처딜 오프닝 - 0:30~1:30 | 채널/공동구매 소개
3. 😤 문제 제기 - 1:30~2:30 | 공감 유발
4. 💡 제품 소개 - 2:30~4:00 | 제품명 강조, 핵심 포지셔닝
5. 🔧 상세 스펙/기능 - 4:00~6:30 | 스펙 설명, 실사용 시나리오
6. 💸 퓨처딜 가격/혜택 - 6:30~8:30 | 가격 공개, 가성비 강조
7. ⏰ 마감 압박 + CTA - 8:30~9:30 | 긴박감, 링크 안내
8. 📣 구독 유도 + 아웃트로 - 9:30~끝

## 필수 포함 멘트
아래 멘트들은 반드시 해당 구간에 자연스럽게 녹여주세요:

${mustMentsList}

## 출력 형식
각 구간을 명확히 구분해서 작성하세요.
형식:
[구간명 | 타임코드 | 예상 분량]
(대본 내용)

실제 읽을 수 있는 완전한 대본으로 작성하세요. 요약이나 가이드라인이 아닌, 그대로 읽어도 되는 완성 대본이어야 합니다.`;
}

// ─── 대본 생성 ───────────────────────────────────────────
async function generateScript() {
  const productName = document.getElementById('productName').value.trim();
  if (!productName) {
    alert('제품명을 입력해주세요.');
    return;
  }

  const productUrl = document.getElementById('productUrl').value.trim();
  const brandName = document.getElementById('brandName').value.trim();
  const category = document.getElementById('category').value;
  const specs = document.getElementById('specs').value.trim();
  const dealPrice = document.getElementById('dealPrice').value.trim();
  const extra = document.getElementById('extra').value.trim();

  const checkedMents = Array.from(document.querySelectorAll('.tag-check:checked'))
    .map(el => el.value);

  setLoading(true, '제품 정보를 분석하고 대본을 생성하고 있어요...');
  setStatus('loading', '생성 중...');

  const userMessage = `다음 제품에 대한 퓨처딜 롱폼 대본을 작성해주세요.

제품명: ${productName}
${brandName ? `브랜드: ${brandName}` : ''}
${category ? `카테고리: ${category}` : ''}
${productUrl ? `제품 링크: ${productUrl}` : ''}
${specs ? `핵심 스펙/특장점:\n${specs}` : ''}
${dealPrice ? `가격 정보: ${dealPrice}` : ''}
${extra ? `추가 요청사항:\n${extra}` : ''}

${productUrl ? '제품 링크의 내용을 참고해서 스펙과 특장점을 최대한 정확하게 반영해주세요.' : '제품명을 기반으로 일반적인 스펙을 참고해서 작성하되, [확인필요] 표시를 붙여주세요.'}

완전한 롱폼 대본(8~12분 분량)을 작성해주세요.`;

  try {
    const response = await callClaude(
      buildSystemPrompt(checkedMents),
      userMessage,
      true // 웹서치 활성화
    );

    currentScript = response;
    renderScript(response, productName);
    setStatus('done', `${productName} 대본 완성`);
    document.getElementById('btnVerify').disabled = false;
    document.getElementById('btnResearch').disabled = false;
    document.getElementById('btnCopy').style.display = 'block';

  } catch (err) {
    setStatus('error', '생성 실패 - 다시 시도해주세요');
    showError(err.message);
  } finally {
    setLoading(false);
  }
}

// ─── 정보 검증 ───────────────────────────────────────────
async function verifyScript() {
  if (!currentScript) return;

  const productName = document.getElementById('productName').value.trim();
  const productUrl = document.getElementById('productUrl').value.trim();

  setLoading(true, '스펙과 정보를 검증하고 있어요...');
  setStatus('verify', '검증 중...');

  const verifyPrompt = `다음은 "${productName}"에 대해 작성된 유튜브 대본입니다.

[대본]
${currentScript}

${productUrl ? `[제품 링크] ${productUrl}` : ''}

대본에 포함된 스펙, 기능, 가격, 수치 정보를 검증해주세요.
반드시 JSON 형식으로만 응답하세요:

{
  "overall": "ok" 또는 "warning",
  "summary": "한 줄 요약",
  "items": [
    {
      "type": "ok" 또는 "warning",
      "content": "확인된 정보 또는 수정 필요한 내용",
      "suggestion": "수정 제안 (warning인 경우만)"
    }
  ]
}`;

  try {
    const response = await callClaude(
      '당신은 제품 정보 팩트체커입니다. JSON 형식으로만 응답합니다.',
      verifyPrompt,
      true
    );

    renderVerifyResult(response);
    setStatus('verify', '검증 완료');

  } catch (err) {
    setStatus('error', '검증 실패');
    showError(err.message);
  } finally {
    setLoading(false);
  }
}

  setLoading(true, `"${productName}" 관련 추가 정보를 조사하고 있어요...`);

// ─── Claude API 호출 ─────────────────────────────────────
async function callClaude(systemPrompt, userMessage, useWebSearch = false) {
  if (DEV_MODE && DEV_API_KEY) {
    // 개발 모드: 직접 API 호출
    const body = {
      model: 'claude-sonnet-4-20250514',
      max_tokens: 4000,
      system: systemPrompt,
      messages: [{ role: 'user', content: userMessage }]
    };

    if (useWebSearch) {
      body.tools = [{ type: 'web_search_20250305', name: 'web_search' }];
    }

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': DEV_API_KEY,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify(body)
    });

    if (!response.ok) throw new Error(`API 오류: ${response.status}`);
    const data = await response.json();
    return data.content.filter(b => b.type === 'text').map(b => b.text).join('');

  } else {
    // 프로덕션 모드: Netlify Functions 프록시
    const response = await fetch(API_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ systemPrompt, userMessage, useWebSearch })
    });

    if (!response.ok) throw new Error(`서버 오류: ${response.status}`);
    const data = await response.json();
    return data.result;
  }
}

const SECTION_TAGS = {
  '훅': { tag: 'tag-hook', label: '🎣 HOOK' },
  '오프닝': { tag: 'tag-open', label: '📢 OPEN' },
  '소개': { tag: 'tag-product', label: '💡 INTRO' },
  '스펙': { tag: 'tag-detail', label: '🔧 SPEC' },
  '기능': { tag: 'tag-detail', label: '🔧 FEAT' },
  '가격': { tag: 'tag-deal', label: '💸 DEAL' },
  '혜택': { tag: 'tag-deal', label: '💸 DEAL' },
  '마감': { tag: 'tag-cta', label: '⏰ CTA' },
  'CTA': { tag: 'tag-cta', label: '⏰ CTA' },
  '구독': { tag: 'tag-cta', label: '📣 SUB' },
  '아웃트로': { tag: 'tag-cta', label: '📣 OUTRO' },
  '문제': { tag: 'tag-detail', label: '😤 PROB' },
};

function getSectionTag(title) {
  for (const [key, val] of Object.entries(SECTION_TAGS)) {
    if (title.includes(key)) return val;
  }
  return { tag: 'tag-detail', label: '📝 SCRIPT' };
}

function renderScript(text, productName) {
  const wrapper = document.getElementById('scriptWrapper');
  document.getElementById('emptyState').style.display = 'none';
  wrapper.style.display = 'block';
  wrapper.innerHTML = '';
  currentScript = text;

  const sectionEl = document.createElement('div');
  sectionEl.className = 'script-section';
  const safeText = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  sectionEl.innerHTML = `
    <div class="script-section-header">
      <span class="section-tag tag-product">📝 SCRIPT</span>
      <span class="section-title">${productName} 대본</span>
    </div>
    <div class="script-section-body" style="white-space:pre-wrap;">${safeText}</div>
  `;
  wrapper.appendChild(sectionEl);
}

function renderVerifyResult(response) {
  const wrapper = document.getElementById('scriptWrapper');

  let parsed;
  try {
    const clean = response.replace(/```json|```/g, '').trim();
    parsed = JSON.parse(clean);
  } catch {
    parsed = {
      overall: 'warning',
      summary: '검증 결과를 파싱하지 못했습니다.',
      items: [{ type: 'warning', content: response.slice(0, 500) }]
    };
  }

  const verifyEl = document.createElement('div');
  verifyEl.className = 'script-section';

  const isOk = parsed.overall === 'ok';
  const itemsHTML = (parsed.items || []).map(item => `
    <div class="verify-item">
      <span class="${item.type === 'ok' ? 'verify-ok-icon' : 'verify-warn-icon'}">${item.type === 'ok' ? '✓' : '⚠'}</span>
      <div>
        <div style="font-size:13px; color:var(--text);">${item.content || ''}</div>
        ${item.suggestion ? `<div style="font-size:12px; color:var(--accent3); margin-top:4px;">→ ${item.suggestion}</div>` : ''}
      </div>
    </div>
  `).join('');

  verifyEl.innerHTML = `
    <div class="script-section-header">
      <span class="section-tag ${isOk ? 'tag-verify-ok' : 'tag-verify-warn'}">${isOk ? '✓ 검증 통과' : '⚠ 수정 필요'}</span>
      <span class="section-title">정보 검증 결과 — ${parsed.summary || ''}</span>
    </div>
    <div class="script-section-body">${itemsHTML}</div>
  `;

  wrapper.insertBefore(verifyEl, wrapper.firstChild);
  verifyEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function renderResearchResult(response, productName) {
  const wrapper = document.getElementById('scriptWrapper');

  const researchEl = document.createElement('div');
  researchEl.className = 'script-section';

  researchEl.innerHTML = `
    <div class="script-section-header">
      <span class="section-tag tag-product">📡 추가 조사</span>
      <span class="section-title">${productName} — 추가 리서치 결과</span>
    </div>
    <div class="script-section-body">${response}</div>
  `;

  wrapper.insertBefore(researchEl, wrapper.firstChild);
  researchEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function showError(msg) {
  const wrapper = document.getElementById('scriptWrapper');
  document.getElementById('emptyState').style.display = 'none';
  wrapper.style.display = 'block';

  wrapper.innerHTML = `
    <div class="script-section">
      <div class="script-section-header">
        <span class="section-tag tag-verify-warn">⚠ 오류</span>
        <span class="section-title">생성 실패</span>
      </div>
      <div class="script-section-body" style="color:var(--accent3);">
        ${msg}<br><br>
        <span style="color:var(--text3); font-size:12px;">
          DEV_MODE가 true인 경우 DEV_API_KEY를 입력해주세요.<br>
          Netlify 배포 환경에서는 netlify/functions/claude.js가 필요합니다.
        </span>
      </div>
    </div>
  `;
}

// ─── UI 유틸 ─────────────────────────────────────────────
function setLoading(on, msg = '') {
  const overlay = document.getElementById('loadingOverlay');
  const btn = document.getElementById('btnGenerate');
  const btnText = document.getElementById('generateBtnText');

  if (on) {
    overlay.classList.add('active');
    document.getElementById('loadingMsg').textContent = msg;
    btn.disabled = true;
    btnText.textContent = '생성 중...';
    isGenerating = true;
  } else {
    overlay.classList.remove('active');
    btn.disabled = false;
    btnText.textContent = '✦ 대본 자동 생성';
    isGenerating = false;
  }
}

function setStatus(type, text) {
  const badge = document.getElementById('statusBadge');
  const detail = document.getElementById('statusDetail');
  badge.className = `status-badge status-${type}`;
  badge.textContent = type === 'idle' ? '대기 중' : type === 'loading' ? '생성 중' : type === 'done' ? '완료' : type === 'verify' ? '검증' : '오류';
  detail.textContent = text;
}

async function copyScript() {
  const wrapper = document.getElementById('scriptWrapper');
  const text = wrapper.innerText;
  await navigator.clipboard.writeText(text);
  const btn = document.getElementById('btnCopy');
  btn.textContent = '✓ 복사됨';
  setTimeout(() => btn.textContent = '📋 전체 복사', 2000);
}

function resetAll() {
  document.getElementById('scriptWrapper').innerHTML = '';
  document.getElementById('scriptWrapper').style.display = 'none';
  document.getElementById('emptyState').style.display = 'flex';
  document.getElementById('btnVerify').disabled = true;
  document.getElementById('btnResearch').disabled = true;
  document.getElementById('btnCopy').style.display = 'none';
  setStatus('idle', '');
  currentScript = '';
}
